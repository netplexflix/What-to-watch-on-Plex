version: '3.8'

services:
  wtwp:
    image: netplexflix/wtwp:latest
    container_name: wtwp
    restart: unless-stopped
    ports:
      - "3000:3000" #change port by using "xxxx:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DATA_PATH=/app/data
      - TZ=Europe/Amsterdam  # Change to your timezone
      - PUID=1000  # Set to your user's UID (run: id -u)
      - PGID=1000  # Set to your user's GID (run: id -g)
      # - UMASK=002  # Optional: file permission mask
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3